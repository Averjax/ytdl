name: Download YouTube Videos (Fixed & Optimized)
on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'Paste URLs (separate with a comma)'
        required: true
      quality:
        description: 'Select Video Quality'
        type: choice
        required: true
        default: '720'
        options:
          - '1080'
          - '720'
          - '480'
      download_audio_only:
        description: 'Download Audio Only (MP3)?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup Cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Process Videos
        run: |
          mkdir -p downloads
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.video_urls }}"
          
          for url in "${ADDR[@]}"; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            
            echo "Processing: $url"
            
            # Get clean title
            TITLE=$(yt-dlp --get-title "$url" | sed 's/[:\/\\*?"<>|]/_/g' || echo "video_$(date +%s)")
            mkdir -p "work_$TITLE"
            
            if [ "${{ github.event.inputs.download_audio_only }}" = "true" ]; then
              # AUDIO ONLY PATH
              yt-dlp -f "bestaudio" \
                     --extract-audio --audio-format mp3 --audio-quality 0 \
                     -o "work_$TITLE/file.mp3" "$url"
              FILE_EXT="mp3"
            else
              # VIDEO PATH
              yt-dlp -f "bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]" \
                     --merge-output-format mp4 \
                     -o "work_$TITLE/file.mp4" "$url"
              FILE_EXT="mp4"
            fi

            # Check if download actually succeeded
            if [ ! -f "work_$TITLE/file.$FILE_EXT" ]; then
              echo "Download failed for $url, skipping..."
              rm -rf "work_$TITLE"
              continue
            fi

            # Split, Script, and Zip
            cd "work_$TITLE"
            split -b 95M "file.$FILE_EXT" "part_"
            rm "file.$FILE_EXT"
            
            # Linux reassemble
            echo "cat part_* > \"$TITLE.$FILE_EXT\"" > reassemble.sh
            # Windows reassemble
            echo "@echo off" > reassemble.bat
            echo "copy /b part_* \"$TITLE.$FILE_EXT\"" >> reassemble.bat
            
            cd ..
            zip -j "downloads/${TITLE}.zip" "work_$TITLE/"*
            rm -rf "work_$TITLE"
          done

      - name: Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Upload: $(date)" || exit 0
          git push

      - name: Update Cookies Secret
        uses: AnimMouse/setup-yt-dlp/cookies/update@v3
        with:
          cookies_secret_name: YOUTUBE_COOKIES
          token: ${{ secrets.GH_PAT }}
