name: YT-DLP Smart Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
      quality:
        description: 'Max Resolution'
        required: true
        default: '720'
        type: choice
        options: ['1080', '720', '480']
      audio_only:
        description: 'Download Audio Only?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Download Media
        run: |
          mkdir -p download
          # Set format based on audio_only input
          if [ "${{ github.event.inputs.audio_only }}" = "true" ]; then
            FORMAT="bestaudio/best"
            EXT="mp3"
          else
            FORMAT="best[height<=${{ github.event.inputs.quality }}]"
            EXT="mp4"
          fi
          
          # Download using restricted filenames to avoid shell errors
          yt-dlp -f "$FORMAT" \
                 --downloader native \
                 --restrict-filenames \
                 -o "download/temp_file.%(ext)s" \
                 "${{ github.event.inputs.video_url }}"
          
          # Get clean title for folder naming
          CLEAN_TITLE=$(yt-dlp --get-title --restrict-filenames "${{ github.event.inputs.video_url }}")
          echo "CLEAN_TITLE=$CLEAN_TITLE" >> $GITHUB_ENV
          echo "EXTENSION=$EXT" >> $GITHUB_ENV

      - name: Process and Split
        run: |
          cd download
          TITLE="${{ env.CLEAN_TITLE }}"
          EXT="${{ env.EXTENSION }}"
          FILE="temp_file.$EXT"
          
          if [ -f "$FILE" ]; then
            mkdir -p "$TITLE"
            mv "$FILE" "$TITLE/full_media.$EXT"
            cd "$TITLE"
            
            # Split if larger than 95MB
            SIZE=$(stat -c%s "full_media.$EXT")
            if [ $SIZE -gt 99614720 ]; then
              split -b 95M "full_media.$EXT" "${TITLE}_part_"
              rm "full_media.$EXT"
              
              # Create Windows BAT merge script
              echo "@echo off" > merge.bat
              echo "echo Reassembling $TITLE..." >> merge.bat
              echo "copy /b ${TITLE}_part_* \"$TITLE.$EXT\"" >> merge.bat
              echo "echo Done!" >> merge.bat
              echo "pause" >> merge.bat
              
              # Create Linux Bash reassemble script
              echo "#!/bin/bash" > reassemble.sh
              echo "cat ${TITLE}_part_* > \"$TITLE.$EXT\"" >> reassemble.sh
              chmod +x reassemble.sh
            else
              mv "full_media.$EXT" "$TITLE.$EXT"
            fi
          fi

      - name: Update yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies/update@v3
        with:
          cookies_secret_name: YOUTUBE_COOKIES
          token: ${{ secrets.GH_PAT }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add download/
          git commit -m "Add ${{ env.CLEAN_TITLE }}" || echo "No changes"
          git push
