name: Download YouTube Videos (Multi-Download & Zip)
on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'YouTube Video URLs (comma-separated for multiple)'
        required: true
      quality:
        description: 'Video Height (e.g., 1080, 720, 480) - Ignored if Audio Only'
        required: true
        default: '720'
      download_audio_only:
        description: 'Download Audio Only?'
        type: boolean
        default: false
      filename_prefix:
        description: 'Optional: Prefix for filenames'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  download-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Create Downloads Folder
        run: mkdir -p downloads

      - name: Process Videos
        run: |
          # Convert comma-separated string into an array
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.video_urls }}"
          
          for url in "${ADDR[@]}"; do
            url=$(echo "$url" | xargs) # trim whitespace
            echo "Processing: $url"
            
            # 1. Get Title and Format
            RAW_TITLE=$(yt-dlp --skip-download --get-title "$url")
            CLEAN_TITLE=$(echo "$RAW_TITLE" | sed 's/[:\/\\*?"<>|]/_/g' | tr ' ' '_')
            
            # Set Format and Extension
            if [ "${{ github.event.inputs.download_audio_only }}" = "true" ]; then
              FORMAT="bestaudio"
              EXT="mp3"
            else
              FORMAT="best[height<=${{ github.event.inputs.quality }}]"
              EXT="mp4"
            fi
            
            # 2. Create temp workspace for this specific video
            mkdir -p "temp_$CLEAN_TITLE"
            
            # 3. Download
            yt-dlp -f "$FORMAT" \
                   --downloader native \
                   --extract-audio --audio-format "$EXT" --audio-quality 0 \
                   --add-metadata \
                   -o "temp_$CLEAN_TITLE/original.$EXT" \
                   "$url" || true # Continue even if one fails
            
            # Identify the actual file (yt-dlp might change extension)
            DOWNLOADED_FILE=$(find "temp_$CLEAN_TITLE" -type f | head -n 1)
            ACTUAL_EXT="${DOWNLOADED_FILE##*.}"
            
            # 4. Split into chunks (95MB)
            cd "temp_$CLEAN_TITLE"
            split -b 95M "original.$ACTUAL_EXT" "part_"
            rm "original.$ACTUAL_EXT"
            
            # 5. Create Reassembly Scripts
            # Linux/Mac
            echo -e "#!/bin/bash\ncat part_* > \"$CLEAN_TITLE.$ACTUAL_EXT\"\necho 'Video Reassembled!'" > reassemble.sh
            chmod +x reassemble.sh
            # Windows
            echo -e "@echo off\ncopy /b part_* \"$CLEAN_TITLE.$ACTUAL_EXT\"\necho Video Reassembled!" > reassemble.bat
            
            cd ..
            
            # 6. Zip it up and move to downloads
            zip -j "downloads/${CLEAN_TITLE}.zip" "temp_$CLEAN_TITLE/"*
            
            # Cleanup temp
            rm -rf "temp_$CLEAN_TITLE"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add videos: ${{ github.event.inputs.video_urls }}" || echo "No changes"
          git push

      - name: Update yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies/update@v3
        with:
          cookies_secret_name: YOUTUBE_COOKIES
          token: ${{ secrets.GH_PAT }}
