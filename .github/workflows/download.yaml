name: YT-DLP Smart Downloader (High Speed)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
      quality:
        description: 'Max Resolution'
        required: true
        default: '720'
        type: choice
        options: ['1080', '720', '480']
      audio_only:
        description: 'Download Audio Only?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: self-hosted
    steps:
      # 1. Fast Checkout (No history)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 
          clean: false 

      # 2. Get Title First (Fastest way to check for duplicates)
      - name: Get and Sanitize Title
        id: meta
        run: |
          RAW_TITLE=$(yt-dlp --get-title --restrict-filenames "${{ github.event.inputs.video_url }}")
          # Sanitize for Windows/Linux safety
          CLEAN_TITLE=$(echo "$RAW_TITLE" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/[ .]$//')
          echo "title=$CLEAN_TITLE" >> $GITHUB_OUTPUT
          
      # 3. Download Media (Optimized for speed)
      - name: Download Media
        run: |
          mkdir -p "download/${{ steps.meta.outputs.title }}"
          cd "download/${{ steps.meta.outputs.title }}"
          
          if [ "${{ github.event.inputs.audio_only }}" = "true" ]; then
            # Audio: High speed extract
            yt-dlp -x --audio-format mp3 \
                   --restrict-filenames \
                   -o "full_media.mp3" \
                   "${{ github.event.inputs.video_url }}"
            EXT="mp3"
          else
            # Video: Use --format-sort for faster resolution picking
            yt-dlp -f "bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]" \
                   --remux-video mp4 \
                   --restrict-filenames \
                   -o "full_media.mp4" \
                   "${{ github.event.inputs.video_url }}"
            EXT="mp4"
          fi
          echo "EXT=$EXT" >> $GITHUB_ENV

      # 4. Instant Split (Using the local filesystem)
      - name: Process and Split
        run: |
          TITLE="${{ steps.meta.outputs.title }}"
          EXT="${{ env.EXT }}"
          cd "download/$TITLE"
          
          SIZE=$(stat -c%s "full_media.$EXT")
          
          if [ $SIZE -gt 99614720 ]; then
            # 95MB split
            split -b 95M "full_media.$EXT" "vid_part_"
            rm "full_media.$EXT"
            # Faster reassemble script creation
            printf "#!/bin/bash\ncat vid_part_* > \"$TITLE.$EXT\" && rm -f vid_part_*" > reassemble.sh
            chmod +x reassemble.sh
          else
            mv "full_media.$EXT" "$TITLE.$EXT"
          fi

      # 5. Fast Push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add download/
          git commit -m "Add ${{ steps.meta.outputs.title }}" || exit 0
          # Using --force or retry logic is often better on self-hosted
          git push
