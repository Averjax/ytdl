# 2. Get and Sanitize Title (Improved bypass)
      - name: Get and Sanitize Title
        id: meta
        run: |
          RAW_TITLE=$(yt-dlp --get-title \
            --restrict-filenames \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --cookies /home/github/cookies.txt \
            "${{ github.event.inputs.video_url }}")
          CLEAN_TITLE=$(echo "$RAW_TITLE" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/[ .]$//')
          echo "title=$CLEAN_TITLE" >> $GITHUB_OUTPUT

      # 3. Download Media (Added client impersonation)
      - name: Download Media
        run: |
          mkdir -p "download/${{ steps.meta.outputs.title }}"
          cd "download/${{ steps.meta.outputs.title }}"
          
          # COMMON ARGS to bypass bot detection
          BYPASS_ARGS='--user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" --cookies /home/github/cookies.txt --extractor-args "youtube:player_client=web,ios"'

          if [ "${{ github.event.inputs.audio_only }}" = "true" ]; then
            yt-dlp -x --audio-format mp3 $BYPASS_ARGS \
                   --restrict-filenames -o "full_media.mp3" \
                   "${{ github.event.inputs.video_url }}"
            echo "EXT=mp3" >> $GITHUB_ENV
          else
            # Changed format filter to be more flexible to avoid "Requested format not available"
            yt-dlp -f "bestvideo[height<=${{ github.event.inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${{ github.event.inputs.quality }}]" \
                   --remux-video mp4 $BYPASS_ARGS \
                   --restrict-filenames -o "full_media.mp4" \
                   "${{ github.event.inputs.video_url }}"
            echo "EXT=mp4" >> $GITHUB_ENV
          fi
