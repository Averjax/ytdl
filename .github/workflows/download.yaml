name: Download YouTube 720p to Repo (Auto‑Refresh Cookies)
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
      filename:
        description: 'Output filename (without extension)'
        required: false
        default: 'video'
permissions:
  contents: write
jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
      - name: Setup yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}
      - name: Download video (720p, native downloader)
        run: |
          mkdir -p videos
          yt-dlp -f "best[height<=720]" \
                 --downloader native \
                 -o "videos/${{ github.event.inputs.filename }}.%(ext)s" \
                 "${{ github.event.inputs.video_url }}"
      # ✅ Fixed splitting step (no here-doc, simple echo commands)
      - name: Split video into chunks
        run: |
          cd videos
          ORIGINAL="${{ github.event.inputs.filename }}.mp4"
          if [ -f "$ORIGINAL" ]; then
            # Split into 95MB parts
            split -b 95M "$ORIGINAL" "${{ github.event.inputs.filename }}_part_"
            # Remove original large file
            rm "$ORIGINAL"
            # Create reassemble script using echo (avoids here-doc issues)
            echo '#!/bin/bash' > reassemble.sh
            echo "cat ${{ github.event.inputs.filename }}_part_* > ${{ github.event.inputs.filename }}.mp4" >> reassemble.sh
            echo 'echo "Reassembled: ${{ github.event.inputs.filename }}.mp4"' >> reassemble.sh
            chmod +x reassemble.sh
          else
            echo "No video file found to split."
            exit 1
          fi
          cd ..
      - name: Commit and push chunks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Add ${{ github.event.inputs.filename }} (split)" || echo "No changes"
          git push
      - name: Update yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies/update@v3
        with:
          cookies_secret_name: YOUTUBE_COOKIES
          token: ${{ secrets.GH_PAT }}
