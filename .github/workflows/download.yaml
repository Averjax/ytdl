name: YT-DLP Smart Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
      quality:
        description: 'Max Resolution'
        required: true
        default: '720'
        type: choice
        options: ['1080', '720', '480']
      audio_only:
        description: 'Download Audio Only?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # No custom token – uses default GITHUB_TOKEN with contents: write

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Download Media
        run: |
          mkdir -p download
          if [ "${{ github.event.inputs.audio_only }}" = "true" ]; then
            # Audio only: extract as MP3
            yt-dlp -x --audio-format mp3 \
                   --restrict-filenames \
                   -o "download/temp_file.mp3" \
                   "${{ github.event.inputs.video_url }}"
            EXT="mp3"
          else
            # Video: remux to MP4
            yt-dlp -f "best[height<=${{ github.event.inputs.quality }}]" \
                   --remux-video mp4 \
                   --restrict-filenames \
                   -o "download/temp_file.mp4" \
                   "${{ github.event.inputs.video_url }}"
            EXT="mp4"
          fi
          echo "EXTENSION=$EXT" >> $GITHUB_ENV

      - name: Get clean video title
        run: |
          CLEAN_TITLE=$(yt-dlp --get-title --restrict-filenames "${{ github.event.inputs.video_url }}")
          echo "CLEAN_TITLE=$CLEAN_TITLE" >> $GITHUB_ENV

      - name: Process and Split
        run: |
          cd download
          TITLE="${{ env.CLEAN_TITLE }}"
          EXT="${{ env.EXTENSION }}"
          FILE="temp_file.${EXT}"
          
          if [ ! -f "$FILE" ]; then
            echo "ERROR: Downloaded file not found: $FILE"
            ls -la
            exit 1
          fi
          
          mkdir -p "$TITLE"
          mv "$FILE" "$TITLE/full_media.${EXT}"
          cd "$TITLE"
          
          SIZE=$(stat -c%s "full_media.${EXT}")
          echo "File size: $SIZE bytes"
          
          if [ $SIZE -gt 99614720 ]; then
            echo "File exceeds 95MB, splitting..."
            split -b 95M "full_media.${EXT}" "vid_part_"
            rm "full_media.${EXT}"
            
            # Linux Bash reassemble script
            echo '#!/bin/bash' > reassemble.sh
            echo "cat vid_part_* > \"$TITLE.$EXT\" && rm -f vid_part_*" >> reassemble.sh
            chmod +x reassemble.sh
          else
            mv "full_media.${EXT}" "$TITLE.$EXT"
          fi
          
          echo "Final files in $(pwd):"
          ls -la

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add download/
          git commit -m "Add ${{ env.CLEAN_TITLE }}" || echo "No changes to commit"
          git push
