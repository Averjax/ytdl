name: Download YouTube Videos (Pro)
on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'Paste URLs here (separate multiple links with a comma)'
        required: true
        default: 'link1, link2'
      quality:
        description: 'Select Video Quality'
        type: choice
        required: true
        default: '720'
        options:
          - '1080'
          - '720'
          - '480'
          - '360'
      download_audio_only:
        description: 'Download Audio Only (MP3)?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup Cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Process URLs
        run: |
          mkdir -p downloads
          
          # Convert the comma-separated input into a loop-friendly list
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.video_urls }}"
          
          for url in "${ADDR[@]}"; do
            # Trim any accidental spaces around the URL
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            
            echo "Starting: $url"
            
            # Get video title for the folder name
            TITLE=$(yt-dlp --get-title "$url" | sed 's/[:\/\\*?"<>|]/_/g')
            mkdir -p "work_$TITLE"
            
            # Set format based on user choice
            if [ "${{ github.event.inputs.download_audio_only }}" = "true" ]; then
              YT_FORMAT="bestaudio"
              EXT="mp3"
            else
              YT_FORMAT="best[height<=${{ github.event.inputs.quality }}]"
              EXT="mp4"
            fi

            # Download
            yt-dlp -f "$YT_FORMAT" \
                   --extract-audio --audio-format "$EXT" --audio-quality 0 \
                   -o "work_$TITLE/video.$EXT" \
                   "$url" || continue

            # Split into 95MB chunks to avoid GitHub's 100MB limit
            cd "work_$TITLE"
            split -b 95M "video.$EXT" "part_"
            rm "video.$EXT"

            # Create Reassemble Scripts
            echo "cat part_* > \"$TITLE.$EXT\"" > reassemble.sh
            echo "@echo off" > reassemble.bat
            echo "copy /b part_* \"$TITLE.$EXT\"" >> reassemble.bat
            
            cd ..
            
            # Zip everything and move to the final downloads folder
            zip -j "downloads/${TITLE}.zip" "work_$TITLE/"*
            rm -rf "work_$TITLE"
          done

      - name: Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Uploaded requested videos" || exit 0
          git push
