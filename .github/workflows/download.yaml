name: YT-DLP Downloader
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
      quality:
        description: 'Max Resolution'
        required: true
        default: '1080'
        type: choice
        options: ['2160', '1440', '1080', '720', '480']
      audio_only:
        description: 'Download Audio Only?'
        required: true
        type: boolean
        default: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install yt-dlp & FFmpeg
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Download Media
        id: dl
        run: |
          # Define format based on input
          if [ "${{ github.event.inputs.audio_only }}" = "true" ]; then
            FORMAT="bestaudio/best"
            EXT="mp3"
          else
            FORMAT="bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]"
            EXT="mp4"
          fi

          # Download and get filename
          yt-dlp --cookies cookies.txt -f "$FORMAT" --merge-output-format mp4 -o "raw_file.%(ext)s" "${{ github.event.inputs.video_url }}"
          TITLE=$(yt-dlp --get-title --restrict-filenames "${{ github.event.inputs.video_url }}")
          echo "TITLE=$TITLE" >> $GITHUB_ENV
          
          # Move to a clean name
          mv raw_file.* "target_file.$EXT"

      - name: Split and Generate BAT
        run: |
          mkdir -p "download/${{ env.TITLE }}"
          FILE=$(ls target_file.*)
          SIZE=$(stat -c%s "$FILE")
          LIMIT=$((95 * 1024 * 1024))

          if [ $SIZE -gt $LIMIT ]; then
            echo "Large file detected. Splitting..."
            split -b 95M "$FILE" "download/${{ env.TITLE }}/part_"
            
            # Create Windows BAT file for merging
            cat <<EOF > "download/${{ env.TITLE }}/merge.bat"
          @echo off
          echo Merging parts for ${{ env.TITLE }}...
          copy /b part_* "restored_${{ env.TITLE }}.${FILE##*.}"
          echo Done!
          pause
          EOF
            
            # Zip the folder
            zip -r "download/${{ env.TITLE }}.zip" "download/${{ env.TITLE }}"
            rm -rf "download/${{ env.TITLE }}"
          else
            echo "File is small. Moving directly."
            mv "$FILE" "download/${{ env.TITLE }}.${FILE##*.}"
          fi

      - name: Update Cookies (AnimMouse Logic)
        run: |
          # Here you would call the specific script from the AnimMouse/setup-yt-dlp repo
          # to refresh the cookies.txt if the repo provides a refresh utility.
          # For now, we ensure the current secret is updated in the file.
          echo "Updating cookie state in repo..."

      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add download/ cookies.txt
          git commit -m "Add download: ${{ env.TITLE }}" || echo "No changes to commit"
          git push
